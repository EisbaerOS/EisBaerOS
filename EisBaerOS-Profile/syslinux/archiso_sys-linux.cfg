LABEL arch
TEXT HELP
Boot the EisBaerOS install medium on BIOS.
It allows you to install EisBaerOS or perform system maintenance.
ENDTEXT
MENU LABEL EisBaerOS install medium (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL%

# Accessibility boot option
LABEL archspeech
TEXT HELP
Boot the EisBaerOS install medium on BIOS with speakup screen reader.
It allows you to install EisBaerOS or perform system maintenance with speech feedback.
ENDTEXT
MENU LABEL EisBaerOS install medium (%ARCH%, BIOS) with ^speech
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% accessibility=on
