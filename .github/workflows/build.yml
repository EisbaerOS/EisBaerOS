name: Build EisBärOS ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm archiso git reflector
          # Enable parallel downloads for speed in CI
          sed -i 's/^#ParallelDownloads.*/ParallelDownloads = 10/' /etc/pacman.conf

      - name: Fix permissions
        run: |
          git config --global --add safe.directory /__w/EisBaerOS/EisBaerOS

      - name: Build ISO
        run: |
          # The script expects to be run as root (which we are in the container)
          bash ./build.sh --clean

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: EisBaerOS-ISO
          path: out/*.iso
          if-no-files-found: error
